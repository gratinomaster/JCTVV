name: Resposta Direta OpenCode

on:
  schedule:
    - cron: '0 13 * * *' # Executa às 10h da manhã (Horário de Brasília)
  workflow_dispatch:

jobs:
  consultar_opencode:
    runs-on: ubuntu-latest
    steps:
      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Obter Resposta do OpenCode
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          # O comando abaixo solicita a resposta direta para a IA
          opencode run "Acesse os dados de mercado de hoje e responda diretamente: 
          1. Quais as 3 melhores ações para comprar na B3 hoje? 
          2. Qual a cotação exata do Dólar agora? 
          3. Qual o preço do Bitcoin em Reais agora?
          Formate a resposta como um relatório de mercado." > RESPOSTA_MERCADO.txt

      - name: Exibir Resposta no Log
        run: cat RESPOSTA_MERCADO.txt
        
      
