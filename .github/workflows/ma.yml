name: LIST

on:
  workflow_dispatch:

jobs:
  opencode:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl wget

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        run: |
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Verify installation
        run: |
          opencode --version

      - name: Run OpenCode Prompt
        run: |
          opencode run "
          salve dentro de lista2.m3u algo que poderei assistir do globo.com
          "

      - name: Save result
        run: |
          ls -la

      - name: Commit result (optional)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Updated IPTV list" || echo "No changes"
          git push
