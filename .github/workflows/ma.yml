name: Baixando GLOBO

on:
schedule:
- cron: '0 */6 * * *'  # Executa a cada 6 horas
pull_request:
branches:
- main
workflow_dispatch:

permissions:
contents: write

jobs:
opencode:
runs-on: ubuntu-latest
timeout-minutes: 20

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Install dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y ffmpeg curl wget

  - name: Install OpenCode
    run: |
      curl -fsSL https://opencode.ai/install | bash

  - name: Add OpenCode to PATH
    run: |
      echo "$HOME/.opencode/bin" >> $GITHUB_PATH

  - name: Verify installation
    run: |
      opencode --version

  - name: Run OpenCode Prompt
    run: |
      opencode run "faça um script chamado GLOBOEPG.py que gere GLOBOEPG.xml.gz com o EPG completo de todas as regiões da Globo usando https://redeglobo.globo.com/sao-paulo/programacao/ como referência. O script deve extrair automaticamente todas as regiões e gerar também um arquivo tvg-ids.txt com os tvg-ids para uso em playlists IPTV. Deve conter 5 dias de programação para todas as regiões e não deve ter nada fixo no código, pois sempre que rodar deve extrair tudo novamente."

  - name: Save result
    run: |
      ls -la

  - name: Commit result
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"
      git add .
      git commit -m "Updated IPTV list" || echo "No changes to commit"
      git push
```
