name: Resposta Direta OpenCode

on:
  schedule:
    - cron: '0 13 * * *' # Executa às 10h da manhã (Horário de Brasília)
  workflow_dispatch: # Permite execução manual

jobs:
  consultar_opencode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: |
          # Instalação via curl
          curl -fsSL https://opencode.ai/install | bash
          # Adiciona ao GITHUB_PATH para que os próximos steps reconheçam o comando 'opencode'
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Obter Resposta do OpenCode
        run: |
          # Importante: Garantir que o PATH atualizado seja usado neste shell
          export PATH="$HOME/.opencode/bin:$PATH"
          
          opencode run "FAÇA UM .YML QUE VAI CONSEGUIR EXECUTAR CORRETAMENTE O GLOBOEPG.PY" > RESPOSTA_MERCADO.txt

      - name: Exibir Resposta no Log
        run: |
          if [ -f RESPOSTA_MERCADO.txt ]; then
            cat RESPOSTA_MERCADO.txt
          else
            echo "Erro: O arquivo de resposta não foi gerado."
            exit 1
          fi

  
      - name: Adicionar Mudanças ao Controle de Versão
        run: |
          git add -A
          git status
  
      - name: Garantir alterações mais recentes do repositório remoto
        run: |
          git pull origin main || echo "Erro ao fazer pull, pode ser que já tenha as últimas alterações."
  
      - name: Commit e Push
        run: |
          git commit -m "Atualizar lista baixada" || echo "Nenhuma mudança para commitar."
          git push origin main || echo "Erro ao fazer push. Pode ser necessário revisar conflitos."          
