name: YA CORRIGE LISTA

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Create prompt
        run: |
          cat << 'EOF' > prompt.txt
          corrija o lista5.m3u 
          para que todos os canais tenham epg valido, atualizado, teste para ver se o epg funciona, pode ser que seja necessario varios epgs para que todos os canais tenham guia, caso haja sinais de afiliadas, procure o epg para cada afiliada, insira a url do epg no arquivo .m3u,veja se tem a programação do dia de hoje e amanhã, e depois de amanhã, remova canais que não passarem no teste do virustotal, adcione tvg-logo onde não exista, tem que estar em .jpg, não deixe links de canais sem o # na linha de cima, os que tiverem tvg-logo que não sejam .jpg devem ser trocados para .jpg, teste se funcionam, não gosto de imgur.com
          EOF

      - name: Run OpenCode
        run: |
          echo "Executando OpenCode..."
          opencode run "$(cat prompt.txt)"

      - name: Check generated files
        run: |
          echo "Arquivos no diretório:"
          ls -la

          if [ -f lista5.m3u ]; then
            echo "Playlist criada:"
            cat lista5.m3u
          else
            echo "lista5.m3u não foi criado"
          fi

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add . || true
          git commit -m "Atualização automática da playlist" || echo "Nada para commit"
          git push origin HEAD || echo "Falha ao dar push"
