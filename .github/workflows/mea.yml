name: Run OpenCode

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # roda a cada 6 horas (opcional)

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Create prompt
        run: |
          cat << 'EOF' > prompt.txt
          faça codigo python que vai conseguir fazer o que vou falar abaixo
          acesse https://www.foxnews.com/video/5614615980001
          use crawl4ai
          encontre o stream do video
          crie lista3.m3u no formato IPTV
          encontre o link m3u8 completo com token
          gere lista3.m3u no formato #extinf com group-title="NEWS WORLD"
          
          EOF

      - name: Run OpenCode
        run: |
          echo "Executando OpenCode..."
          opencode run "$(cat prompt.txt)"

      - name: Check generated file
        run: |
          if [ -f lista3.m3u ]; then
            echo "Arquivo criado:"
            cat lista3.m3u
          else
            echo "lista3.m3u não foi criado"
          fi

      - name: Commit playlist
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add lista3.m3u || true

          git commit -m "Atualização automática da playlist" || echo "Nada para commit"

          git push
