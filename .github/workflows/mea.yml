name: Resposta Direta OpenCode

on:
  schedule:
    - cron: '0 13 * * *' # Executa às 10h da manhã (Horário de Brasília)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  consultar_opencode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurar Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Instalar OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Obter resposta do OpenCode
        run: |
          opencode run "FAÇA UM .YML QUE VAI CONSEGUIR EXECUTAR CORRETAMENTE O GLOBOEPG.PY" > resposta_opencode.txt

      - name: Exibir resposta no log
        run: |
          if [ -f resposta_opencode.txt ]; then
            cat resposta_opencode.txt
          else
            echo "Erro: O arquivo de resposta não foi gerado."
            exit 1
          fi

      - name: Commit das mudanças
        run: |
          git add resposta_opencode.txt
          git commit -m "Atualizar resposta do OpenCode" || echo "Sem alterações"

      - name: Push para o repositório
        run: |
          git push
