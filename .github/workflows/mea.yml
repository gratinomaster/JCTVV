name: Run OpenCode

on:
  workflow_dispatch:
  push:

jobs:
  opencode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Ask OpenCode
        run: |
          PERGUNTA=$(cat << 'EOF'
          diga qual dia é hoje e quem é o presidente do brasil
          EOF
          )

          echo "Pergunta: $PERGUNTA"
          echo ""
          echo "Resposta do OpenCode:"
          opencode run "$PERGUNTA"
