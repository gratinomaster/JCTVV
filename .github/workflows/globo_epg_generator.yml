name: Executar Globo EPG

on:
  schedule:
    - cron: '0 13 * * *' # Executa diariamente às 10h (Horário de Brasília)
  workflow_dispatch: # Permite que você clique em "Run workflow" para testar agora

jobs:
  execucao_script:
    runs-on: ubuntu-latest

    steps:
      - name: Passo 1: Puxar arquivos do repositório
        uses: actions/checkout@v4

      - name: Passo 2: Instalar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Passo 3: Instalar bibliotecas necessárias
        run: |
          python -m pip install --upgrade pip
          # Caso seu script use requests ou beautifulsoup, instale aqui:
          pip install requests

      - name: Passo 4: Rodar o script
        run: python GLOBOEPG.py
