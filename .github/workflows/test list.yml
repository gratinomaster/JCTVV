name: MURDOCK

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Create prompt
        run: |
          cat << 'EOF' > prompt.txt
          acesse ESTADOS UNIDOS RESERVA.m3u
          exclua os canais offline
          EOF

      - name: Run OpenCode
        run: |
          echo "Executando OpenCode..."
          opencode run "$(cat prompt.txt)"

      - name: Check generated files
        run: |
          echo "Arquivos no diretório:"
          ls -la

          if [ -f lista5.m3u ]; then
            echo "Playlist criada:"
            cat lista5.m3u
          else
            echo "lista5.m3u não foi criado"
          fi

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add . || true
          git commit -m "Atualização automática da playlist" || echo "Nada para commit"
          git push origin HEAD || echo "Falha ao dar push"
