name: ya

on:
  workflow_dispatch:

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run OpenCode
        run: |
          opencode run "transforme https://aeroescuta.com.br/sample-page/helicopteros-sp/ em NOSARES.m3u com conteudo no estilo #extinf"
          

      - name: Commit INVEST.txt
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add INVEST.txt
          git commit -m "Atualiza resumo de investimentos" || echo "Nada para commit"
          git push
