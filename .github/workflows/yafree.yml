name: ya

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "O que você quer gerar"
        required: true
      filename:
        description: "Nome do arquivo de saída (ex: lista.m3u)"
        required: true

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # importante para rebase

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run OpenCode and save output
        run: |
          opencode run "${{ github.event.inputs.prompt }}" > "${{ github.event.inputs.filename }}"

      - name: Commit generated file safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add *.m3u *.txt || true
          git commit -m "Adiciona arquivo gerado" || echo "Nada para commit"

          # Tenta sincronizar antes de enviar
          for i in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} && break || sleep 2
          done

          # Push com retry
          for i in 1 2 3; do
            git push origin HEAD:${{ github.ref_name }} && break || sleep 2
          done
