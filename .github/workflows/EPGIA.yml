name: EPGFULL

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

concurrency:
  group: newsworld-playlist
  cancel-in-progress: false

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Create prompt
        run: |
          cat << 'EOF' > prompt.txt
          acesse https://github.com/gratinomaster/1/raw/refs/heads/main/lista1.M3U
          crie EPGFULL.xml.gz sem os canais que não estão no arquivo .m3u, para que o guia não fique maior do que preciso
          caso este arquivo já exista .xml.gz já exista, sobescreva
          EOF

      - name: Run OpenCode
        run: |
          echo "Executando OpenCode..."
          opencode run "$(cat prompt.txt)"

      - name: Check generated files
        run: |
          echo "Arquivos no diretório:"
          ls -la

          if [ -f lista5.m3u ]; then
            echo "Playlist criada:"
            cat lista5.m3u
          else
            echo "lista5.m3u não foi criado"
          fi

      - name: Commit and Push safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add . || true
          git commit -m "Atualização automática da playlist" || echo "Nada para commit"

          # tenta sincronizar e enviar sem sobrescrever ninguém
          for i in {1..10}; do
            echo "Tentativa $i de push..."

            git fetch origin

            git rebase origin/$(git rev-parse --abbrev-ref HEAD) || {
              echo "Conflito no rebase, abortando e tentando novamente..."
              git rebase --abort
              sleep 5
              continue
            }

            git push origin HEAD && break

            echo "Push falhou, tentando novamente em 5s..."
            sleep 5
          done
