name: Run OpenCode

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Create prompt
        run: |
          cat << 'EOF' > prompt.txt
          crie um arquivo chamado stream_finder.py em python

          o script deve:

          usar crawl4ai

          acessar os sites:

          https://cbn.globo.com/ao-vivo/video/cbn-sp/
          https://g1.globo.com/sp/ribeirao-preto-franca/ao-vivo/eptv1.ghtml
          https://g1.globo.com/sp/campinas-regiao/ao-vivo/veja-o-eptv-2-campinas-ao-vivo.ghtml
          https://g1.globo.com/sp/piracicaba-regiao/ao-vivo/eptv-2-piracicaba-ao-vivo.ghtml
          https://g1.globo.com/sp/ribeirao-preto-franca/ao-vivo/eptv-2-ribeirao-e-franca-ao-vivo.ghtml

          o script deve:

          1 acessar cada página
          2 encontrar o stream de vídeo (m3u8)
          3 gerar um arquivo chamado lista3.m3u
          tem que ter tvg-logo

          formato da playlist:

          #EXTM3U
          #EXTINF:-1 group-title="NEWS WORLD",NOME DO CANAL
          URL_DO_STREAM

          salvar lista3.m3u no diretório atual
          salvar também o arquivo python stream_finder.py
          EOF

      - name: Run OpenCode
        run: |
          echo "Executando OpenCode..."
          opencode run "$(cat prompt.txt)"

      - name: Check generated files
        run: |
          echo "Arquivos no diretório:"
          ls -la

          if [ -f lista3.m3u ]; then
            echo "Playlist criada:"
            cat lista3.m3u
          else
            echo "lista3.m3u não foi criado"
          fi

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add *.py lista3.m3u prompt.txt || true

          git commit -m "Atualização automática da playlist" || echo "Nada para commit"

          git push
